version: 1
backend:
  phases:
    preBuild:
      commands:
        - nvm install 20
        - nvm use 20
        - npm cache verify --cache .npm
        - npm install --cache .npm --prefer-offline --no-audit --legacy-peer-deps
    build:
      commands:
        - npm install graphql@15.10.1 --no-save --legacy-peer-deps
        - npm run pipeline-deploy
frontend:
  phases:
    build:
      commands:
        - nvm use 20
        - npx ampx generate outputs --branch $AWS_BRANCH --app-id $AWS_APP_ID --out-dir .
        - node scripts/extract-amplify-env.mjs
        - env | grep -e GOOGLE_API_KEY >> .env.production || true
        - env | grep -e NEXT_PUBLIC_AI_API_URL >> .env.production || true
        - npm install graphql@16.6.0 --no-save --legacy-peer-deps
        - npm run build
    postBuild:
      commands:
        - ls out
        - aws s3 sync out s3://$S3_BUCKET_NAME --delete
        # Configure CloudFront to serve 404.html for missing paths (SPA deep-linking support)
        # This allows the smart not-found page to handle client-side routing for dynamic routes
        - node scripts/configure-cloudfront-spa.mjs
        - aws cloudfront create-invalidation --distribution-id $CF_DIST_ID --paths "/*"
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - .next/cache/**/*
      - .npm/**/*
      - node_modules/**/*
